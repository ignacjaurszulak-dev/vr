<!DOCTYPE html>
<html lang="en">

<script src="script.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Ignacja VR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
<script src="script.js"></script>
</head>

<body>
 <a-scene>
    <a-assets>
    <img id="sponge " src="images/spongeBob.jpg" preload="auto">
    <img id="fish " src="images/fish.jpg" preload="auto">
    </a-assets>
    <a-entity environment="preset: moon; dressingAmount: 500; skyColor:#003366; groundColor:#CDAA6D; groundColor2:#e2ca76; "></a-entity>
    <!--Museum Start-->
    <a-cylinder id="floor" position="0 0 0" radius="7.5" height="0.1" color="#CDAA6D" ></a-cylinder>
    <a-box id="wall1" position="0 1.473 4.907" scale="10 3 0.1" src="images/holmespj-fruit-3535905_1280.jpg"></a-box>
    <a-box id="wall2" position="0 1.473 -4.907" scale="10 3 0.1" src="images/holmespj-fruit-3535905_1280.jpg"></a-box>
    <a-box id="wall3" position="5.049 1.454 -0.008" rotation="0 -90 0"scale="10 3 0.1" src="images/holmespj-fruit-3535905_1280.jpg"></a-box>
    <a-box id="wall4" position="-5.049 1.454 -0.008" rotation="0 -90 0"scale="10 3 0.1" src="images/holmespj-fruit-3535905_1280.jpg"></a-box>
    <!--Roof-->
    <a-cylinder id="triangle_front" segments-radial="3" position="0 3.874 4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" src="images/nennieinszweidrei-thick-leaf-plant-3729742_1280.jpg"></a-cylinder>
    <a-cylinder id="triangle_back" segments-radial="3" position="0 3.874 -4.907" rotation="-90 0 0" scale="5.774 0.2 1.8" src="images/nennieinszweidrei-thick-leaf-plant-3729742_1280.jpg"></a-cylinder>
    <a-box id="roof_right" position="2.580 4.328 0" rotation="28.433 90 0" scale="10.931 0.20 6.110" src="images/nennieinszweidrei-thick-leaf-plant-3729742_1280.jpg"></a-box>
    <a-box id="roof_left" position="-2.599 4.321 -0.017" rotation="28.433 -90 0" scale="10.931 0.20 6.130" src="images/nennieinszweidrei-thick-leaf-plant-3729742_1280.jpg"></a-box>
<!--ART-->
    <a-plane id="art1" src="images/spongeBob.jpg" scale="2 2 0.05" rotation="0 0 0" position="-2.490- 1.934 -4.793"></a-plane>
    <a-plane id="art2" src="images/fish.jpg" scale="2 2 0.05" rotation="0 0 0" position="-0.162 1.934 -4.792"></a-plane>

 <!-- 3D Object from Tinkercad -->
<a-obj-model id="3dModel1" src="images/tinker.obj" mtl="images/obj.mtl" position="1.640 0.00 -4.310" scale="0.02 0.02 0.02" rotation="-90 0 0"></a-obj-model>
 <a-box id="plinth" position="2.676 0.486 -4.708" scale=".2  1 .2" color="silver"></a-box>
 <!--info2-->
 <a-plane id="info_box1" position="2.676 0.486 -4.708" rotation="0 0 -180"scale=".2  1 .2" width="0.8" height="0.25" color="black" transparent="true" opacity="1"
 <a-entity
 position="2.458 0.862 -4.652"
 scale="0.8 0.5 1.273"
 shader="flat"
 text="value: Giant Squid, image by Igncajca Urszulak from Pixaby; align: center; color: white; font: roboto;""
 <a/-entity>
</a-plane>
<a-assets><!-- Video -->
<video id="videoclip" loop="true"src="tvAssets/harry_potter.mp4" crossorigin="anonymous" preload="auto"></video>
<!-- Buttons and Background -->
  <img id="play" src="tvAssets/btnPlay.png" preload="auto">
  <img id="pause" src="tvAssets/btnPause.png" preload="auto">
  <img id="tv_background" src="tvAssets/tv_background.jpg"preload="auto">
<!-- TV with Play and Pause -->
<a-entity>
  <a-video src="#videoclip" position="-3.893 1.6 0" rotation="0 90 0" width="2" height="1.125"></a-video>

  <!-- TV background -->
  <a-plane id="videoControls" position="-3.893 0.854 0" scale="2 0.386 1.714" rotation="0 90 0" opacity="1" src="#tv_background">
    
    <!-- Play button -->
    <a-plane id="vidplaybox" src="#play" scale="0.122 0.678 0.122" position="-0.350 0 .01" shader="flat" transparent="true" videoplayer></a-plane>
    
    <!-- Stop button -->
    <a-plane id="vidpausebox" src="#pause" scale="0.122 0.678 0.122" position="0.350 0 .01" shader="flat" transparent="true" videopauser></a-plane>

  </a-plane>
</a-entity>

<!-- Allows clicking with the mouse -->
<a-entity cursor="rayOrigin: mouse"></a-entity>




 </a-scene>



 
</body>
</html>
